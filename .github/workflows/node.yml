name: Node CI

on:
  push:
    branches:
      - main
      - fund-alert-daemon-refactor
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run config:validate -- --config ./config/fund-alert.example.json
